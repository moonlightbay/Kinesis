defaults:
  - _self_
  - env: env_im
  - learning: im_mlp
  - run: train_run_legs_back

notes: "Default Notes"
project: kinesis_legs_back
datadir: legs_back
exp_name: &exp_name kinesis_legs_back
seed: 0
no_log: False
resume_str: null
output_dir: data/trained_models/legs_back/${exp_name}
epoch: 0

hydra:
  job:
    name: ${exp_name}
    env_set:
      OMP_NUM_THREADS: 1
  run:
    dir: data/trained_models/legs_back/${exp_name}

